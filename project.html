<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Atharva Patil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .detail-hero {
            padding-top: 150px;
            padding-bottom: 50px;
            text-align: center;
        }
        .detail-title {
            font-size: clamp(2rem, 4vw, 3.5rem);
            margin-bottom: 1rem;
        }
        .detail-category {
            color: var(--secondary);
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            display: inline-block;
            background: rgba(0, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        .detail-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .detail-image {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 3rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            display: none; /* hidden if no image */
        }
        .detail-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        .detail-content {
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-muted);
        }
        .detail-content h3 {
            color: var(--text-main);
            margin: 2rem 0 1rem;
            font-size: 1.5rem;
        }
        .detail-content ul {
            margin-left: 1.5rem;
            margin-bottom: 2rem;
        }
        .detail-content li {
            margin-bottom: 0.5rem;
        }
        .detail-tech {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">Atharva<span>.</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html" class="highlight">Projects</a></li>
            <li><a href="index.html#contact" class="btn-primary">Contact Me</a></li>
        </ul>
    </nav>

    <div id="error-message" style="display: none; padding-top: 150px; text-align: center; color: var(--text-muted);">
        <h2>Project not found</h2>
        <a href="projects.html" class="btn-secondary" style="margin-top: 2rem;">Back to Projects</a>
    </div>

    <section id="project-detail" class="detail-hero" style="display: none;">
        <div class="container reveal">
            <a href="projects.html" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; transition: var(--transition);">
                <i class="fas fa-arrow-left"></i> Back to Projects
            </a>
            
            <h1 class="detail-title" id="p-title">Project Title</h1>
            <div class="detail-category" id="p-category">Category</div>
            
            <div class="detail-links" id="p-links">
                <!-- Injected via JS -->
            </div>

            <div class="detail-image" id="p-image-container">
                <img id="p-image" src="" alt="Project Screenshot">
            </div>

            <div class="glass-card" style="text-align: left;">
                <div class="detail-content" id="p-content">
                    <!-- Injected via JS -->
                </div>

                <div class="detail-tech">
                    <h3 style="margin-bottom: 1.5rem; color: var(--text-main); font-family: 'Outfit';">Technologies Used</h3>
                    <div class="tech-stack wrap" id="p-tech">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>Designed & Built by Atharva Patil</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="project-detail.js"></script>
</body>
</html>
